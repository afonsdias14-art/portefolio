<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact | Afonso Dias</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body class="contact-page-body">

  <!-- HEADER / MENU -->
  <header class="site-header contact-header">
    <img
      src="assents/rasgos/menu1.png"
      alt=""
      class="menu-paper"
      aria-hidden="true"
    />

    <div class="menu-content">
      <a href="index.html" class="logo">PORTFOLIO</a>

      <nav class="main-nav" aria-label="Menu principal">
        <a href="index.html">INDEX</a>
        <a href="index.html#about">ABOUT</a>
        <a href="work.html">WORK</a>
        <a href="contact.html">CONTACT</a>
      </nav>
    </div>
  </header>

  <main class="contact-main">

    <section class="contact-hero" aria-labelledby="contact-title">

      <h1 id="contact-title" class="contact-title">
        CONTACT ME
      </h1>

      <div class="contact-content">

        <form class="contact-form" action="mailto:adias.design25@gmail.com" method="post" enctype="text/plain">

          <div class="form-group">
            <label class="form-label">NAME <span>(required)</span></label>

            <div class="name-grid">
              <div>
                <input type="text" name="first-name" required />
                <span class="input-helper">FIRST NAME</span>
              </div>

              <div>
                <input type="text" name="last-name" required />
                <span class="input-helper">LAST NAME</span>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="service">SERVICE</label>
            <input id="service" type="text" name="service" />
          </div>

          <div class="form-group">
            <label class="form-label" for="email">EMAIL <span>(required)</span></label>
            <input id="email" type="email" name="email" required />
          </div>

          <div class="form-group">
            <label class="form-label" for="description">PROJECT DESCRIPTION</label>
            <textarea id="description" name="project-description"></textarea>
          </div>

          <button type="submit" class="contact-button">
            SERVICE
          </button>

        </form>

      </div>

    </section>

    <section class="contact-bottom" aria-label="Contactos">
      <div class="contact-bottom-inner">

        <a href="mailto:adias.design25@gmail.com" class="big-contact-link">
          adiasdesign25@gmail.com
        </a>

        <a href="tel:+351925821268" class="big-contact-link phone-link">
          925821268
        </a>

        <p class="contact-tagline">
          ideias sketched by hand, transformed into digital experiences
        </p>

      </div>
    </section>

  </main>

</body>
</html>
